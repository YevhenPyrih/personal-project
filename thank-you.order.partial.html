<section class="thank-you-order" id="thank-you-order">
  <div class="thank-you-order__container">
    <h1 class="thank-you-order__title">Thank you for your order!</h1>

    <div class="thank-you-order__grid">
      <article class="thank-you-order__card thank-you-order__card--summary">
        <h2 class="thank-you-order__order-id" id="thank-you-order-id">#0001</h2>

        <div class="thank-you-order__item-row">
          <img
            class="thank-you-order__item-image"
            id="thank-you-product-image"
            src="img/product-sea.webp"
            alt="Shine Box"
          />

          <p class="thank-you-order__item-name" id="thank-you-product-name">
            Shine Box
          </p>

          <p class="thank-you-order__item-meta">
            <span id="thank-you-item-quantity">1x</span>
            <span id="thank-you-item-price">$399,99USD</span>
          </p>
        </div>

        <p class="thank-you-order__total-row">
          <span>Total:</span>
          <span id="thank-you-total">$399,99USD</span>
        </p>
      </article>

      <aside class="thank-you-order__card thank-you-order__card--customer">
        <h2 class="thank-you-order__customer-title">Customer details</h2>
        <p class="thank-you-order__customer-line">
          Comments: <span id="thank-you-comments">-</span>
        </p>
        <p class="thank-you-order__customer-line">
          Name: <span id="thank-you-name">-</span>
        </p>
        <p class="thank-you-order__customer-line">
          Email: <span id="thank-you-email">-</span>
        </p>
        <p class="thank-you-order__customer-line">
          Phone: <span id="thank-you-phone">-</span>
        </p>
      </aside>
    </div>
  </div>
</section>
